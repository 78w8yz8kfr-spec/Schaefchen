name: Logo final korrigieren

on:
  push:
    paths:
      - .github/workflows/fix-logo-final.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vollständiges Logo einsetzen
        run: |
          python - <<'PY'
          import base64
          data = ''''''
          open('logo.png','wb').write(base64.b64decode(data))
          PY
      - name: Darstellung korrigieren
        run: |
          cat >> style.css <<'CSS'

          /* v31: vollständiges rechteckiges Firmenlogo ohne Beschnitt */
          .appHeader {
            align-items: center !important;
          }
          .appLogo {
            display: block !important;
            width: 126px !important;
            height: auto !important;
            max-height: 82px !important;
            object-fit: contain !important;
            object-position: center !important;
            border-radius: 0 !important;
            background: transparent !important;
            flex: 0 0 auto !important;
          }
          @media (max-width: 520px) {
            .appLogo {
              width: 118px !important;
              height: auto !important;
              max-height: 76px !important;
            }
          }
          CSS
          python - <<'PY'
          from pathlib import Path
          import re
          for name in ('index.html','script.js'):
              p=Path(name)
              if p.exists():
                  s=p.read_text(encoding='utf-8')
                  s=re.sub(r'logo\.png\?v=\d+', 'logo.png?v=31', s)
                  s=re.sub(r'style\.css\?v=\d+', 'style.css?v=31', s)
                  p.write_text(s, encoding='utf-8')
          PY
      - name: Änderungen speichern
        run: |
          rm .github/workflows/fix-logo-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logo.png style.css index.html script.js .github/workflows/fix-logo-final.yml
          git commit -m "Logo vollständig und proportional darstellen"
          git push
