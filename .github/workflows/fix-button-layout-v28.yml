name: Button-Layout v28 korrigieren

on:
  push:
    paths:
      - .github/workflows/fix-button-layout-v28.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Button-Layout auf Mobilgeräten erzwingen
        run: |
          cat >> style.css <<'CSS'

          /* v28: Ausgabeaktionen immer zweispaltig */
          .protocolOutputActions {
            display: grid !important;
            grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr) !important;
            gap: 7px !important;
            width: 100% !important;
          }
          .protocolOutputActions button {
            width: 100% !important;
            min-width: 0 !important;
            margin: 0 !important;
          }
          @media (max-width: 520px) {
            .protocolOutputActions {
              display: grid !important;
              grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr) !important;
            }
            .protocolOutputActions button {
              font-size: 11px !important;
              padding: 9px 6px !important;
              white-space: nowrap !important;
            }
          }
          CSS

          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('style.css?v=27', 'style.css?v=28')
          s = s.replace('style.css?v=26', 'style.css?v=28')
          p.write_text(s, encoding='utf-8')
          PY

      - name: Änderungen speichern
        run: |
          rm .github/workflows/fix-button-layout-v28.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add style.css index.html .github/workflows/fix-button-layout-v28.yml
          git commit -m "Button-Layout auf Mobilgeräten korrigieren"
          git push
