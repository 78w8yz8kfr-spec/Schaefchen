name: Fix Logo und Buttons

on:
  push:
    paths:
      - .github/workflows/fix-logo-buttons.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pillow installieren
        run: python -m pip install --upgrade pillow

      - name: Logo sauber zuschneiden
        run: |
          python - <<'PY'
          from PIL import Image
          from collections import deque

          path = 'logo.png'
          img = Image.open(path).convert('RGBA')
          w, h = img.size
          px = img.load()

          mask = [[False] * w for _ in range(h)]
          for y in range(h):
              for x in range(w):
                  r, g, b, a = px[x, y]
                  mask[y][x] = a > 20 and min(r, g, b) < 235

          seen = [[False] * w for _ in range(h)]
          components = []
          for y in range(h):
              for x in range(w):
                  if not mask[y][x] or seen[y][x]:
                      continue
                  q = deque([(x, y)])
                  seen[y][x] = True
                  pts = []
                  while q:
                      cx, cy = q.popleft()
                      pts.append((cx, cy))
                      for ny in range(max(0, cy - 1), min(h, cy + 2)):
                          for nx in range(max(0, cx - 1), min(w, cx + 2)):
                              if not seen[ny][nx] and mask[ny][nx]:
                                  seen[ny][nx] = True
                                  q.append((nx, ny))
                  components.append(pts)

          main = max(components, key=len)
          xs = [p[0] for p in main]
          ys = [p[1] for p in main]
          pad = 5
          box = (
              max(0, min(xs) - pad),
              max(0, min(ys) - pad),
              min(w, max(xs) + pad + 1),
              min(h, max(ys) + pad + 1),
          )
          img.crop(box).save(path, optimize=True)
          PY

      - name: Button-Layout und Logo-Darstellung korrigieren
        run: |
          cat >> style.css <<'CSS'

          /* v27: ausschließlich Logo und Aktionsbuttons korrigiert */
          .appLogo {
            width: 112px;
            height: 70px;
            object-fit: contain;
            border-radius: 0;
            background: transparent;
          }
          .protocolActions,
          .protocolOutputActions {
            width: 100%;
          }
          .protocolActions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
          }
          .protocolActions button,
          .protocolOutputActions button {
            width: 100%;
            min-width: 0;
            margin: 0;
            white-space: nowrap;
          }
          .protocolOutputActions {
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
          }
          @media (max-width: 520px) {
            .appLogo {
              width: 104px;
              height: 64px;
              border-radius: 0;
            }
            .protocolOutputActions {
              grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            }
          }
          CSS

          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('style.css?v=26', 'style.css?v=27')
          s = s.replace('logo.png?v=26', 'logo.png?v=27')
          p.write_text(s, encoding='utf-8')
          PY

      - name: Änderungen speichern
        run: |
          rm .github/workflows/fix-logo-buttons.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add style.css index.html logo.png .github/workflows/fix-logo-buttons.yml
          git commit -m "Logo und Button-Formatierung korrigieren"
          git push