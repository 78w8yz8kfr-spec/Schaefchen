name: Blaue Logo-Ecken entfernen

on:
  push:
    paths:
      - .github/workflows/remove-blue-logo-corners.yml

permissions:
  contents: write

jobs:
  fix-logo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pillow installieren
        run: python -m pip install pillow

      - name: Blaue Bildpunkte im Logo entfernen
        run: |
          python - <<'PY'
          from PIL import Image
          from pathlib import Path
          import re

          p = Path('logo.png')
          img = Image.open(p).convert('RGBA')
          px = img.load()
          w, h = img.size

          for y in range(h):
              for x in range(w):
                  r, g, b, a = px[x, y]
                  # Nur klar blaue/türkise Artefakte entfernen, Rot und Schwarz bleiben unberührt.
                  if a > 0 and b > 90 and b > r * 1.15 and b > g * 1.05:
                      px[x, y] = (255, 255, 255, a)

          img.save(p, optimize=True)

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          text = re.sub(r'logo\.png\?v=\d+', 'logo.png?v=33', text)
          index.write_text(text, encoding='utf-8')

          script = Path('script.js')
          if script.exists():
              text = script.read_text(encoding='utf-8')
              text = re.sub(r'logo\.png\?v=\d+', 'logo.png?v=33', text)
              script.write_text(text, encoding='utf-8')
          PY

      - name: Änderungen speichern
        run: |
          rm .github/workflows/remove-blue-logo-corners.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logo.png index.html script.js .github/workflows/remove-blue-logo-corners.yml
          git commit -m "Blaue Ecken aus Firmenlogo entfernen"
          git push
