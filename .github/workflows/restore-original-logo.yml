name: Originales Logo wiederherstellen

on:
  push:
    paths:
      - .github/workflows/restore-original-logo.yml

permissions:
  contents: write

jobs:
  restore-logo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unverändertes Original-Logo wiederherstellen
        run: |
          curl -L --fail --silent --show-error \
            "https://raw.githubusercontent.com/78w8yz8kfr-spec/Schaefchen/a4c9bf4f9f9e86cdacbe231d59e3dbd61ad78373/logo.png" \
            -o logo.png

      - name: Logo proportional und vollständig anzeigen
        run: |
          cat >> style.css <<'CSS'

          /* v30: originales Firmenlogo unverändert und proportional darstellen */
          .appHeader {
            align-items: center !important;
          }
          .appLogo {
            display: block !important;
            width: auto !important;
            height: 76px !important;
            max-width: 132px !important;
            object-fit: contain !important;
            object-position: center !important;
            border-radius: 0 !important;
            background: transparent !important;
            overflow: visible !important;
            flex: 0 0 auto !important;
          }
          @media (max-width: 520px) {
            .appHeader {
              align-items: center !important;
            }
            .appLogo {
              width: auto !important;
              height: 72px !important;
              max-width: 126px !important;
            }
          }
          CSS

          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          import re
          text = re.sub(r'style\.css\?v=\d+', 'style.css?v=30', text)
          text = re.sub(r'logo\.png\?v=\d+', 'logo.png?v=30', text)
          index.write_text(text, encoding='utf-8')

          script = Path('script.js')
          if script.exists():
              text = script.read_text(encoding='utf-8')
              text = re.sub(r'logo\.png\?v=\d+', 'logo.png?v=30', text)
              script.write_text(text, encoding='utf-8')
          PY

      - name: Änderungen speichern
        run: |
          rm .github/workflows/restore-original-logo.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logo.png style.css index.html script.js .github/workflows/restore-original-logo.yml
          git commit -m "Originales Logo wiederherstellen und proportional anzeigen"
          git push
