name: Logo aus Originalquelle korrigieren

on:
  push:
    paths:
      - .github/workflows/fix-logo-source.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pillow installieren
        run: python -m pip install Pillow
      - name: Original-Logo laden und vollständig zuschneiden
        run: |
          curl -L --fail --silent --show-error \
            "https://raw.githubusercontent.com/78w8yz8kfr-spec/Schaefchen/a4c9bf4f9f9e86cdacbe231d59e3dbd61ad78373/logo.png" \
            -o logo-source.png
          python - <<'PY'
          from PIL import Image

          img = Image.open('logo-source.png').convert('RGBA')
          w, h = img.size
          px = img.load()

          # Nur den oberen Logo-Bereich auswerten. Die separate blaue Zierlinie
          # im unteren Teil der ursprünglichen Grafik wird nicht übernommen.
          scan_h = max(1, int(h * 0.72))
          xs, ys = [], []
          for y in range(scan_h):
              for x in range(w):
                  r, g, b, a = px[x, y]
                  if a > 20 and min(r, g, b) < 238:
                      xs.append(x)
                      ys.append(y)

          if not xs:
              raise RuntimeError('Kein Logo-Inhalt erkannt')

          pad = 4
          box = (
              max(0, min(xs) - pad),
              max(0, min(ys) - pad),
              min(w, max(xs) + pad + 1),
              min(h, max(ys) + pad + 1),
          )
          img.crop(box).save('logo.png', optimize=True)
          PY
      - name: Logo proportional darstellen
        run: |
          cat >> style.css <<'CSS'

          /* v32: vollständiges Firmenlogo ohne Verzerrung oder Beschnitt */
          .appHeader {
            align-items: center !important;
          }
          .appLogo {
            display: block !important;
            width: 122px !important;
            height: auto !important;
            max-width: 122px !important;
            max-height: none !important;
            object-fit: contain !important;
            object-position: center !important;
            border-radius: 0 !important;
            background: transparent !important;
            flex: 0 0 122px !important;
          }
          @media (max-width: 520px) {
            .appLogo {
              width: 116px !important;
              max-width: 116px !important;
              height: auto !important;
              flex-basis: 116px !important;
            }
          }
          CSS
          python - <<'PY'
          from pathlib import Path
          import re
          for name in ('index.html','script.js'):
              p = Path(name)
              if not p.exists():
                  continue
              s = p.read_text(encoding='utf-8')
              s = re.sub(r'logo\.png\?v=\d+', 'logo.png?v=32', s)
              s = re.sub(r'style\.css\?v=\d+', 'style.css?v=32', s)
              p.write_text(s, encoding='utf-8')
          PY
      - name: Änderungen speichern
        run: |
          rm -f logo-source.png .github/workflows/fix-logo-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logo.png style.css index.html script.js .github/workflows/fix-logo-source.yml
          git commit -m "Firmenlogo vollständig und proportional korrigieren"
          git push
